    <section class="page_contact">
      <div class="inner01">
        <div class="sub_inner02a">
          <div class="box01a">
            <div class="box01_wrd" style="align-items: center">
              <h1 class="white">Contact Us</h1>
            </div>
            <div class="box01_pic02"></div>
          </div>
          <div class="box01a">
            <div class="box01_wrd">
              <form
                action="javascript:void(0);"
                method="POST"
                id="contactForm"
                class="contact_form"
              >
                <div class="box01a">
                  <input
                    type="text"
                    name="first_name"
                    placeholder="First Name*"
                    required
                  />
                  <input
                    type="text"
                    name="last_name"
                    placeholder="Last Name*"
                    required
                  />
                </div>

                <input type="tel" name="phone" placeholder="Phone*" required />

                <input
                  type="email"
                  name="email"
                  placeholder="Email*"
                  required
                />

                <input type="text" name="company" placeholder="Company Name*" />

                <input type="text" name="job_title" placeholder="Job Title*" />

                <select name="enquiry" class="select" required>
                  <option value="">Type of Enquiry*</option>
                  <option value="Accounting Solutions">
                    Accounting Solutions
                  </option>
                  <option value="IT Solutions">IT Solutions</option>
                  <option value="Business Consultation">
                    Business Consultation
                  </option>
                  <option value="Other">Other</option>
                </select>

                <textarea
                  name="message"
                  placeholder="Message*"
                  rows="6"
                  required
                ></textarea>

                <div
                  id="messageBox"
                  style="
                    display: none;
                    padding: 10px;
                    margin-bottom: 15px;
                    border-radius: 4px;
                  "
                ></div>

                <button class="button01_white" id="submitBtn" type="submit">
                  Submit
                </button>
              </form>
            </div>
            <div class="box01_pic02"></div>
          </div>
        </div>
